*{
  margin: 0;

nav{

label.logo{

nav ul{
  float: right;

nav ul li{
  display: inline-block;
  line-height: 80px;

}
nav ul li a{
  color: #00FC85;
  font-weight: 500;
  font-size: 20px;
  padding: 7px 13px;
  border-radius: 3px;
  /* text-transform: uppercase; */

}
a.active,a:hover{
  background:#1b9bff;
  transition: .5s;
}
.checkbtn{
  font-size: 30px;
  color: white;
  float: right;
  line-height: 80px;
  margin-right: 40px;
  cursor: pointer;
  display: none;
}
#check{
  display: none;
}
@media (max-width: 952px){
  label.logo{
	font-size: 27px;
	padding-left: 25px;
  }
  nav ul li a{
	font-size: 16px;
  }
}
@media (max-width: 858px){
  .checkbtn{
	display: block;
	margin-right: 40px;
  }
  ul{
	position: fixed;
	width: 100%;
	height: 100vh;
	background: #262626;
	top: 80px;
	left: -100%;
	text-align: center;
	transition: all .5s;
  }
  nav ul li{
	display: block;
	margin: 50px 0;
	line-height: 30px;
  }
  nav ul li a{

  a:hover,a.active{

  }
  #check:checked ~ ul{
