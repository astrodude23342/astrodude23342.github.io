<head>
<script>

    return false;
  }
  if (x == "User23342") {
    alert("Du wirst zur Website weitergeleitet...");
    return true;
  }
  else {
    alert("Falscher Username!");
    return false;
  }
}
  if (x == true) {
    window.location.href = "https://bit.ly/astronomieworld";

  }
</script>
</head>
<body>

<center><h2>AstroWorld</h2>
