<!DOCTYPE html>
<html>
<head>
<script>
function validateForm() {
  let x = document.forms["myForm"]["username"].value;
  if (x == "") {
    alert("Username muss ausgefüllt werden!");
    return false;
  }
  if (x == "AstroUser23342") {
    alert("Du wirst zur Website weitergeleitet...");
    return true;
  }
  else {
    alert("Falscher Username!");
    return false;
  }
}

</script>
</head>
<body>

<center><h2>AstroWorld</h2>

<form name="myForm" action="https://bit.ly/astro1342" onsubmit="return validateForm()" method="post">
  Username: <input type="text" name="username"><br>
  <input name="submit" type="submit" value="Submit">
</form></center>

</body>
